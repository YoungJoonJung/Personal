    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 500px;
            margin: auto;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .airport-dropdown {
            position: relative;
            max-height: 240px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-top: none;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            z-index: 100;
            display: none;
        }

        .airport-dropdown.visible {
            display: block;
        }

        .airport-item {
            padding: 10px;
            border-bottom: 1px solid #f1f1f1;
            cursor: pointer;
        }

        .airport-item:last-child {
            border-bottom: none;
        }

        .airport-item:hover {
            background-color: #f0f8ff;
        }

        .airport-code {
            font-weight: 700;
            margin-right: 8px;
        }

        .airport-details {
            color: #555;
            font-size: 0.95em;
        }

        .info {
            font-size: 0.85em;
            color: #666;
            margin-top: 10px;
        }
    </style>

        function createAirportLabel(airport) {
            return `${airport.code} · ${airport.city}, ${airport.country} — ${airport.name}`;
        }

        function searchAirports(query) {
            const normalized = query.trim().toUpperCase();
            if (!normalized) {
                return airports.slice(0, 12);
            }
            return airports.filter(airport => {
                return airport.code.includes(normalized)
                    || airport.name.toUpperCase().includes(normalized)
                    || airport.city.toUpperCase().includes(normalized)
                    || airport.country.toUpperCase().includes(normalized);
            }).slice(0, 20);
        }

        function renderDropdown(inputId, dropdownId, query) {
            const dropdown = document.getElementById(dropdownId);
            const results = searchAirports(query);
            dropdown.innerHTML = '';

            if (results.length === 0) {
                const item = document.createElement('div');
                item.className = 'airport-item';
                item.textContent = '검색 결과가 없습니다.';
                dropdown.appendChild(item);
                dropdown.classList.add('visible');
                return;
            }

            results.forEach(airport => {
                const item = document.createElement('div');
                item.className = 'airport-item';
                item.innerHTML = `
                    <span class="airport-code">${airport.code}</span>
                    <span class="airport-details">${airport.city}, ${airport.country} — ${airport.name}</span>
                `;
                item.addEventListener('mousedown', function (event) {
                    event.preventDefault();
                    selectAirport(inputId, airport.code);
                });
                dropdown.appendChild(item);
            });
            dropdown.classList.add('visible');
        }

        function selectAirport(inputId, code) {
            const input = document.getElementById(inputId);
            input.value = code;
            const dropdown = document.getElementById(inputId + 'Dropdown');
            if (dropdown) dropdown.classList.remove('visible');
            input.focus();
        }

        function closeDropdown(dropdownId) {
            const dropdown = document.getElementById(dropdownId);
            if (dropdown) dropdown.classList.remove('visible');
        }

        function attachAirportSearch(inputId, dropdownId) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);

            input.addEventListener('focus', () => {
                renderDropdown(inputId, dropdownId, input.value);
            });

            input.addEventListener('input', () => {
                renderDropdown(inputId, dropdownId, input.value);
            });

            input.addEventListener('blur', () => {
                setTimeout(() => closeDropdown(dropdownId), 150);
            });

            input.addEventListener('keydown', event => {
                if (event.key === 'Escape') {
                    closeDropdown(dropdownId);
                }
            });
        }

        function getAirportCode(value) {
            const normalized = value.trim();
            const codeMatch = normalized.toUpperCase().match(/^[A-Z]{3}$/);
            if (codeMatch) {
                return codeMatch[0];
            }
            const found = airports.find(airport => createAirportLabel(airport).toUpperCase().startsWith(normalized.toUpperCase()));
            if (found) {
                return found.code;
            }
            const partial = airports.find(airport => createAirportLabel(airport).toUpperCase().includes(normalized.toUpperCase()));
            return partial ? partial.code : '';
        }

        function searchFlights() {
            const originValue = document.getElementById('origin').value;
            const destValue = document.getElementById('destination').value;
            const origin = getAirportCode(originValue);
            const dest = getAirportCode(destValue);
            const depDate = document.getElementById('depDate').value;
            const retDate = document.getElementById('retDate').value;

            if (!origin || !dest || !depDate || !retDate) {
                alert('모든 정보를 입력해주세요. 공항 검색 결과에서 공항을 선택하거나 IATA 코드를 입력하세요.');
                return;
            }

            const bookingUrl = `https://flights.booking.com/flights/${origin}.CITY-${dest}.CITY/?type=ROUNDTRIP&adults=1&cabinClass=ECONOMY&depart=${depDate}&return=${retDate}&stops=0&sort=CHEAPEST`;
            const skyscannerUrl = `https://www.skyscanner.co.kr/transport/flights/${origin}/${dest}/${depDate.replace(/-/g, '').slice(2)}/${retDate.replace(/-/g, '').slice(2)}/?adults=1&stops=direct`;
            const naverUrl = `https://flight.naver.com/flights/international/${origin}-${dest}-${depDate.replace(/-/g, '')}/${dest}-${origin}-${retDate.replace(/-/g, '')}?adults=1&isDirect=true`;
            const googleSimpleUrl = `https://www.google.com/travel/flights?q=Flights%20to%20${dest}%20from%20${origin}%20on%20${depDate}%20through%20${retDate}%20oneway=false%20stops=0`;

            window.open(bookingUrl, '_blank');
            window.open(skyscannerUrl, '_blank');
            window.open(naverUrl, '_blank');
            window.open(googleSimpleUrl, '_blank');
        }

        document.addEventListener('DOMContentLoaded', function () {
            attachAirportSearch('origin', 'originDropdown');
            attachAirportSearch('destination', 'destinationDropdown');
        });
